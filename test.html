<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <script>
        function scheduleMeeting(startTime, duration) {
    let dayStart = '7:30';
    let dayEnd = '17:45';
    let result = true;
    let endTime = startTime.split(":");
    let totalHoursInDuration = Math.floor(duration/60);
    let remainingMinutesInDuration = duration - (totalHoursInDuration * 60);
    let endTimeTotalMinutes = parseInt(endTime[1]) + remainingMinutesInDuration;
    let totalHoursInEndtimeMinutes = Math.floor(endTimeTotalMinutes/60);
    endTime[1] = endTimeTotalMinutes - (totalHoursInEndtimeMinutes * 60);
    endTime[0] = parseInt(endTime[0]) + parseInt(totalHoursInDuration) + parseInt(totalHoursInEndtimeMinutes);
    if(endTime[0] < dayStart.split(":")[0] || endTime[0] > dayEnd.split(":")[0]) {
            result = false;
    } else if(endTime[0] == dayStart.split(":")[0] || endTime[0] == dayEnd.split(":")[0]) {
        if(endTime[1] < dayEnd.split(":")[1] || endTime[1] > dayEnd.split(":")[1]) {
            result = false;
        }
    }
    console.log(result, endTime, totalHoursInDuration, remainingMinutesInDuration, endTimeTotalMinutes, totalHoursInEndtimeMinutes);
}

console.log(scheduleMeeting('7:00', 15));
    </script>
</body>
</html>
